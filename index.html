<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Viewer IFC</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
      "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js",
      "three/examples/jsm/utils/BufferGeometryUtils": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/utils/BufferGeometryUtils.js",
      "three/examples/jsm/utils/BufferGeometryUtils.js": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/utils/BufferGeometryUtils.js",
      "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.47/web-ifc-api.js"
    }
  }
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    #viewer-container {
      width: 100vw;
      height: 100vh;
    }

    #panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: 300px;
      max-height: 85vh;
      overflow: auto;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      font-size: 13px;
    }

    #project-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #status {
      margin-top: 8px;
      color: #444;
    }

    #properties {
      margin-top: 12px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }

    .prop-title {
      font-weight: bold;
      margin: 8px 0 4px;
    }

    .prop-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid #eee;
      padding: 4px 0;
    }

    .prop-key {
      font-weight: bold;
      color: #333;
    }

    .prop-value {
      color: #555;
      text-align: right;
      word-break: break-word;
    }
  </style>
</head>

<body>

  <div id="panel">
    <div id="project-title">Projeto</div>

    <input type="file" id="file-input" accept=".ifc" />

    <div id="status">Aguardando arquivo IFC...</div>

    <div id="properties">
      Clique em um elemento para ver propriedades.
    </div>
  </div>

  <div id="viewer-container"></div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
    import { IFCLoader } from "https://cdn.jsdelivr.net/npm/web-ifc-three@0.0.126/IFCLoader.js";

    const container = document.getElementById("viewer-container");
    const status = document.getElementById("status");
    const propertiesPanel = document.getElementById("properties");
    const projectTitle = document.getElementById("project-title");

    const urlParams = new URLSearchParams(window.location.search);
    const fileUrl = urlParams.get("file");
    const projectName = urlParams.get("nome") || urlParams.get("projeto") || "Projeto";

    projectTitle.innerText = decodeURIComponent(projectName);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2f2f2);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100000
    );

    camera.position.set(30, 30, 30);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(20, 40, 20);
    scene.add(light);

    const grid = new THREE.GridHelper(100, 100);
    grid.position.y = -1;
    scene.add(grid);

    const ifcLoader = new IFCLoader();

    ifcLoader.ifcManager.setWasmPath(
      "https://cdn.jsdelivr.net/npm/web-ifc@0.0.47/"
    );

    let currentModel = null;
    let currentModelID = 0;

    async function loadIFC(url) {
      status.innerText = "Carregando IFC...";
      propertiesPanel.innerHTML = "Clique em um elemento para ver propriedades.";

      try {
        if (currentModel) {
          scene.remove(currentModel);
        }

        const model = await ifcLoader.loadAsync(url);
        currentModel = model;
        currentModelID = model.modelID;

        scene.add(model);

        const boxOriginal = new THREE.Box3().setFromObject(model);
        const center = boxOriginal.getCenter(new THREE.Vector3());
        const size = boxOriginal.getSize(new THREE.Vector3());

        model.position.sub(center);

        const boxCentered = new THREE.Box3().setFromObject(model);
        grid.position.y = boxCentered.min.y - 0.5;

        const maxDim = Math.max(size.x, size.y, size.z);
        const dist = maxDim * 1.5;

        camera.position.set(dist, dist, dist);
        camera.near = maxDim / 100;
        camera.far = maxDim * 100;
        camera.updateProjectionMatrix();

        controls.target.set(0, 0, 0);
        controls.update();

        status.innerText = "Modelo carregado com sucesso.";

      } catch (error) {
        console.error(error);
        status.innerText = "Erro ao carregar IFC. Veja o Console.";
      }
    }

    document.getElementById("file-input").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      loadIFC(url);
    });

    if (fileUrl) {
      loadIFC(fileUrl);
    }

    function formatIFCValue(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "object" && "value" in value) return value.value;
      if (typeof value === "object") return JSON.stringify(value);
      return value;
    }

    function renderProperties(title, data) {
      let html = `<div class="prop-title">${title}</div>`;

      for (const key in data) {
        const value = formatIFCValue(data[key]);

        if (
          value === "" ||
          key === "type" ||
          key === "expressID" ||
          typeof value === "object"
        ) {
          continue;
        }

        html += `
          <div class="prop-row">
            <div class="prop-key">${key}</div>
            <div class="prop-value">${value}</div>
          </div>
        `;
      }

      return html;
    }

    async function showElementProperties(expressID) {
      try {
        const itemProps = await ifcLoader.ifcManager.getItemProperties(
          currentModelID,
          expressID,
          true
        );

        const propertySets = await ifcLoader.ifcManager.getPropertySets(
          currentModelID,
          expressID,
          true
        );

        let html = "";

        html += renderProperties("Elemento", itemProps);

        const psetSPOL = propertySets.find(pset => {
          const name = formatIFCValue(pset.Name);
          return name === "Pset_SPOL_EV";
        });

        if (psetSPOL) {
          html += `<div class="prop-title">Pset_SPOL_EV</div>`;

          const props = psetSPOL.HasProperties || [];

          for (const prop of props) {
            const name = formatIFCValue(prop.Name);
            const value = formatIFCValue(prop.NominalValue);

            html += `
              <div class="prop-row">
                <div class="prop-key">${name}</div>
                <div class="prop-value">${value}</div>
              </div>
            `;
          }
        } else {
          html += `
            <div class="prop-title">Pset_SPOL_EV</div>
            <div>Este elemento não possui Pset_SPOL_EV.</div>
          `;
        }

        propertiesPanel.innerHTML = html;

      } catch (error) {
        console.error(error);
        propertiesPanel.innerHTML = "Erro ao ler propriedades do elemento.";
      }
    }

    renderer.domElement.addEventListener("click", async (event) => {
      if (!currentModel) return;

      const bounds = renderer.domElement.getBoundingClientRect();

      const mouse = new THREE.Vector2(
        ((event.clientX - bounds.left) / bounds.width) * 2 - 1,
        -((event.clientY - bounds.top) / bounds.height) * 2 + 1
      );

      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObject(currentModel, true);

      if (intersects.length === 0) return;

      const intersection = intersects[0];
      const expressID = ifcLoader.ifcManager.getExpressId(
        intersection.object.geometry,
        intersection.faceIndex
      );

      showElementProperties(expressID);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

</body>
</html>
