<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>IFC Viewer</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
    "three/examples/jsm/controls/OrbitControls.js":
    "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js",
    "three/examples/jsm/utils/BufferGeometryUtils":
    "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/utils/BufferGeometryUtils.js",
    "web-ifc":
    "https://cdn.jsdelivr.net/npm/web-ifc@0.0.47/web-ifc-api.js"
  }
}
</script>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }
#viewer { width:100vw; height:100vh; }
#panel {
  position:absolute; top:10px; left:10px;
  background:white; padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="panel">
  <div id="title">Projeto</div>
  <div id="status">Carregando...</div>
</div>

<div id="viewer"></div>

<script type="module">

import * as THREE from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
import { IFCLoader } from "https://cdn.jsdelivr.net/npm/web-ifc-three@0.0.126/IFCLoader.js";

const params = new URLSearchParams(window.location.search);
const fileUrl = params.get("file");
const nome = params.get("nome") || "Projeto";

document.getElementById("title").innerText = decodeURIComponent(nome);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100000);
camera.position.set(20,20,20);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("viewer").appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,40,20);
scene.add(light);

const grid = new THREE.GridHelper(100,100);
scene.add(grid);

const loader = new IFCLoader();
loader.ifcManager.setWasmPath("https://cdn.jsdelivr.net/npm/web-ifc@0.0.47/");

let model;

async function loadIFC(url){
  const m = await loader.loadAsync(url);
  model = m;
  scene.add(m);

  const box = new THREE.Box3().setFromObject(m);
  const center = box.getCenter(new THREE.Vector3());
  m.position.sub(center);

  document.getElementById("status").innerText = "Modelo carregado";
}

if(fileUrl) loadIFC(fileUrl);

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
