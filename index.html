<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>IFC Viewer SPOL</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
    "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js",
    "three/examples/jsm/utils/BufferGeometryUtils": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/utils/BufferGeometryUtils.js",
    "three/examples/jsm/utils/BufferGeometryUtils.js": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/utils/BufferGeometryUtils.js",
    "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.47/web-ifc-api.js"
  }
}
</script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    #viewer-container {
      width: 100vw;
      height: 100vh;
    }

    const urlParams = new URLSearchParams(window.location.search);
const fileUrl = urlParams.get("file");

if (fileUrl) {
  loadIFC(fileUrl);
}

document.getElementById("file-input").addEventListener("change", async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  loadIFC(url);
});

async function loadIFC(url) {
  status.innerText = "Carregando IFC...";

  try {
    if (currentModel) scene.remove(currentModel);

    const model = await ifcLoader.loadAsync(url);
    currentModel = model;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    model.position.sub(center);

    const maxDim = Math.max(size.x, size.y, size.z);
    const dist = maxDim * 1.5;

    camera.position.set(dist, dist, dist);
    camera.updateProjectionMatrix();

    controls.target.set(0, 0, 0);
    controls.update();

    status.innerText = "Modelo carregado com sucesso.";

  } catch (error) {
    console.error(error);
    status.innerText = "Erro ao carregar IFC.";
  }
}

    #status {
      margin-top: 6px;
      color: #444;
    }
  </style>
</head>

<body>

  <div id="upload">
    <strong>IFC Viewer SPOL</strong><br><br>
    <input type="file" id="file-input" accept=".ifc" />
    <div id="status">Aguardando arquivo IFC...</div>
  </div>

  <div id="viewer-container"></div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
    import { IFCLoader } from "https://cdn.jsdelivr.net/npm/web-ifc-three@0.0.126/IFCLoader.js";

    const container = document.getElementById("viewer-container");
    const status = document.getElementById("status");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2f2f2);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100000
    );
    camera.position.set(30, 30, 30);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(20, 40, 20);
    scene.add(light);

    const grid = new THREE.GridHelper(100, 100);
    scene.add(grid);

    const ifcLoader = new IFCLoader();
    ifcLoader.ifcManager.setWasmPath(
      "https://cdn.jsdelivr.net/npm/web-ifc@0.0.47/"
    );

    let currentModel = null;

    document.getElementById("file-input").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      status.innerText = "Carregando IFC...";

      try {
        if (currentModel) {
          scene.remove(currentModel);
        }

        const url = URL.createObjectURL(file);
        const model = await ifcLoader.loadAsync(url);
        currentModel = model;
        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        model.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z);
        const dist = maxDim * 1.5;

        camera.position.set(dist, dist, dist);
        camera.near = maxDim / 100;
        camera.far = maxDim * 100;
        camera.updateProjectionMatrix();

        controls.target.set(0, 0, 0);
        controls.update();

        status.innerText = "Modelo carregado com sucesso.";

      } catch (error) {
        console.error(error);
        status.innerText = "Erro ao carregar IFC. Veja o Console.";
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

</body>
</html>
