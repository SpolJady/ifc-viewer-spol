<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Viewer IFC</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
    "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js",
    "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.47/web-ifc-api.js"
  }
}
</script>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#f2f2f2; }

#viewer-container { width:100vw; height:100vh; }

#panel {
  position:absolute; top:12px; left:12px;
  width:300px; max-height:85vh;
  overflow:auto;
  background:white; padding:12px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);
  font-size:13px;
}

.prop-title { font-weight:bold; margin-top:10px; }
.prop-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #eee; }
</style>
</head>

<body>

<div id="panel">
  <div id="project-title">Projeto</div>
  <input type="file" id="file-input" />
  <div id="status">Aguardando IFC...</div>
  <div id="properties">Clique em um elemento</div>
</div>

<div id="viewer-container"></div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
import { IFCLoader } from "https://cdn.jsdelivr.net/npm/web-ifc-three@0.0.126/IFCLoader.js";

const container = document.getElementById("viewer-container");
const status = document.getElementById("status");
const propertiesPanel = document.getElementById("properties");

const urlParams = new URLSearchParams(window.location.search);
const fileUrl = urlParams.get("file");
const projectName = urlParams.get("nome") || "Projeto";
document.getElementById("project-title").innerText = decodeURIComponent(projectName);

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf2f2f2);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100000);
camera.position.set(30,30,30);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.8));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,40,20);
scene.add(light);

// GRID
const grid = new THREE.GridHelper(100,100);
scene.add(grid);

// IFC
const ifcLoader = new IFCLoader();
ifcLoader.ifcManager.setWasmPath("https://cdn.jsdelivr.net/npm/web-ifc@0.0.47/");

// 🔥 PRECISÃO DE CLIQUE (ESSENCIAL)
ifcLoader.ifcManager.setupThreeMeshBVH(
  THREE.Mesh.prototype.computeBoundsTree,
  THREE.Mesh.prototype.disposeBoundsTree,
  THREE.Mesh.prototype.acceleratedRaycast
);

let currentModel = null;
let currentModelID = 0;
let selectedSubset = null;

// LOAD IFC
async function loadIFC(url){
  status.innerText = "Carregando...";

  if(currentModel) scene.remove(currentModel);

  const model = await ifcLoader.loadAsync(url);
  currentModel = model;
  currentModelID = model.modelID;

  scene.add(model);

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);

  const newBox = new THREE.Box3().setFromObject(model);
  grid.position.y = newBox.min.y - 0.5;

  status.innerText = "Modelo carregado";
}

// FILE INPUT
document.getElementById("file-input").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(file){
    loadIFC(URL.createObjectURL(file));
  }
});

if(fileUrl) loadIFC(fileUrl);

// HELPERS
function normalizeName(name){
  return String(name).toUpperCase().replaceAll("_"," ").trim();
}

// PROPRIEDADES
async function showProps(id){
  const sets = await ifcLoader.ifcManager.getPropertySets(currentModelID,id,true);

  const pset = sets.find(s => normalizeName(s.Name)==="PSET SPOL EV");

  if(!pset){
    propertiesPanel.innerHTML = "Sem PSet_SPOL_EV";
    return;
  }

  let html = "<div class='prop-title'>PSet SPOL EV</div>";

  (pset.HasProperties||[]).forEach(p=>{
    html += `<div class='prop-row'><div>${p.Name}</div><div>${p.NominalValue?.value}</div></div>`;
  });

  propertiesPanel.innerHTML = html;
}

// 🔥 HIGHLIGHT CORRETO
function highlight(expressID){

  if(selectedSubset){
    ifcLoader.ifcManager.removeSubset(
      currentModelID,
      undefined,
      selectedSubset.material
    );
    selectedSubset = null;
  }

  const material = new THREE.MeshLambertMaterial({
    color: 0xffff00,
    transparent: true,
    opacity: 0.6,
    depthTest: false
  });

  selectedSubset = ifcLoader.ifcManager.createSubset({
    modelID: currentModelID,
    ids: [expressID],
    material: material,
    scene: scene,
    removePrevious: true
  });
}

// CLICK
renderer.domElement.addEventListener("click", async (event)=>{

  const mouse = new THREE.Vector2(
    (event.clientX/window.innerWidth)*2-1,
    -(event.clientY/window.innerHeight)*2+1
  );

  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse,camera);

  const found = raycaster.intersectObject(currentModel,true);

  if(!found.length) return;

  const expressID = ifcLoader.ifcManager.getExpressId(
    found[0].object.geometry,
    found[0].faceIndex
  );

  highlight(expressID);
  showProps(expressID);
});

// LOOP
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
